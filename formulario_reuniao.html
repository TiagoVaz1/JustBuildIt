<!doctype html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>Login Just Build IT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">

    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.css" rel="stylesheet">
    <link href="css/vegas.min.css" rel="stylesheet">
    <link href="css/tooplate-barista.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
        }
        .contact-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-color: var(--section-bg-color);
        }
        .custom-form input,
        .custom-form button {
            max-width: 400px;
            margin: 10px auto;
        }
        .custom-form button {
            cursor: pointer;
        }
    </style>
</head>

<body>

<section class="contact-section section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-12">

                <div class="text-center mb-4">
                    <h2 class="text-white">Login</h2>
                </div>

                <form action="/submeter.html" method="post" class="custom-form contact-form">

                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                    <input type="password" name="Password" class="form-control" placeholder="Password" required>

                    <div class="form-check text-white mb-4">
                        <input class="form-check-input" type="checkbox" name="termos" id="termos">
                        <label class="form-check-label" for="termos">
                            Lembrar de mim
                        </label>
                    </div>

                    <button type="submit" class="form-control custom-btn">
                        Entrar
                    </button>

                </form>

            </div>
        </div>
    </div>
</section>

<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/vegas.min.js"></script>

</body>
</html>
